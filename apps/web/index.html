<!doctype html>
<html lang="en" class="h-full antialiased" data-theme="light" data-mood="calm">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1020" />
    <meta
      name="description"
      content="Serenity AI — a calm, intelligent companion for mental wellness. Breathe, reflect, and feel safe."
    />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&display=swap"
    />
    <title>Serenity AI — Quiet your mind</title>
    <script>
      // Theme bootstrap — runs before paint to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem('serenity:theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          var mood = localStorage.getItem('serenity:mood') || 'calm';
          document.documentElement.setAttribute('data-mood', mood);
        } catch (_) {}
      })();
    </script>
  </head>
  <body class="h-full bg-surface text-fg font-sans">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
